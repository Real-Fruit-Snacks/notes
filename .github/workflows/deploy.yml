name: Deploy notes site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Install from the vendored wheels in ./wheels — no PyPI access needed,
      # so builds are reproducible and survive registry outages.
      - run: pip install --no-index --find-links wheels -r requirements-dev.txt

      # A failing suite stops the deploy; the previous site version stays live.
      - name: Run tests
        run: python -m pytest tests/ -q

      # ${{ github.event.repository.name }} -> the /<repo>/ base path Pages serves from.
      - name: Build site
        run: |
          python build.py \
            --vault vault \
            --out dist \
            --base-url "/${{ github.event.repository.name }}/" \
            --site-url "https://${{ github.repository_owner }}.github.io" \
            --title "My Notes"

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
